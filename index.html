<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Sonder Concierge</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <header>

        </header>

        <!-- This is card section -->
         <section class="trips-section">
            <header>
                <h2>All trips <span>2 trips</span></h2>
            </header>
            <div class="cards">
                <div class="card card-new">
                    <div class="card-new-inner">
                        <i data-lucide="plus" class="icon-plus"></i>
                        <h2>Start a new trip</h2>
                        <p>Tell the concierge where you're headed and recommendations.</p>
                    </div>
                </div>
                <div class="card card-trip-1">
                    <div class="collage-img">
                        <span class="badge">DRAFT</span>
                        <img src="./assets/delta-2.jpg" alt="">
                        <img src="./assets/images/lisbon-2.jpg" alt="">
                        <img src="./assets/images/lisbon-3.jpg" alt="">
                        <img src="./assets/images/lisbon-4.jpg" alt="">
                    </div>
                    <div class="card-body">
                          <h3>Lisbon, 5-year anniversary</h3>
                          <p class="card-desc">5 stays recommended · Started just now</p>
                           <div class="label-group">
                                <span class="label">Lisbon</span>
                                <span class="label">1-2 weeks</span>
                                <span class="label">For two</span>
                            </div>
                            <hr>
                            <button class="btn-outline">Continue Planning <i data-lucide="arrow-right"></i> </button>
                    </div>
                </div>
                <div class="card card-trip-2">
                     <div class="collage-img">
                        <span class="badge">DRAFT</span>
                        <img src="./assets/delta-1.jpg" alt="">
                        <img src="./assets/images/lisbon-1.jpg" alt="">
                    </div>
                    <div class="card-body">
                          <h3>Lisbon, 5-year anniversary</h3>
                          <p class="card-desc">5 stays recommended · Started just now</p>
                           <div class="label-group">
                                <span class="label">Lisbon</span>
                                <span class="label">1-2 weeks</span>
                                <span class="label">For two</span>
                            </div>
                            <hr>
                            <button class="btn-outline">Continue Planning <i data-lucide="arrow-right"></i> </button>
                    </div>
                </div>

            </div>

         </section>
    </main>
    

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="scripts/script.js"></script>
</body>
</html>
